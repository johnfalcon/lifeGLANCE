# lifeGLANCE with NAS-sync sidecar.
#
# Both services in one stack — `docker compose up -d` brings up both.
# State (milestones, chapters, photos as base64, plus audio/video blobs)
# is persisted to ./data on the host, so it survives browser-cache wipes
# and is part of your normal host-level backup.
#
# Images are pre-built by the GitHub Actions workflow in this repo. If
# you fork it, the workflow auto-pushes to ghcr.io/<your-user>/lifeglance
# and ghcr.io/<your-user>/lifeglance-sync. Edit the image: lines below
# to point at your namespace.

name: lifeglance

services:
  lifeglance:
    image: ghcr.io/johnfalcon/lifeglance:latest
    container_name: lifeglance
    restart: unless-stopped
    ports:
      - "8078:80"
    depends_on:
      - lifeglance-sync

  lifeglance-sync:
    image: ghcr.io/johnfalcon/lifeglance-sync:latest
    container_name: lifeglance-sync
    restart: unless-stopped
    ports:
      # Host 8089 -> container 8079. Change the host side if 8089 is
      # already used on your machine. If you change it, you must also
      # rebuild the lifeglance image with a matching VITE_SYNC_URL so
      # the browser can find the sidecar.
      - "8089:8079"
    volumes:
      - ./data:/data
    environment:
      - DATA_DIR=/data
      - PORT=8079
